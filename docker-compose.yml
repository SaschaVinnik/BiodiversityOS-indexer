services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biodiversity
      POSTGRES_PASSWORD: biodiversity
      POSTGRES_DB: biodiversity_indexer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biodiversity -d biodiversity_indexer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    image: ghcr.io/saschavinnik/biodiversityos-indexer:latest
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Override to use the 'db' hostname inside the Docker network
      DATABASE_URL: postgresql://biodiversity:biodiversity@db:5432/biodiversity_indexer
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
